<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>TG FASHION PRO - Ultra Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #e67e22; --dark: #121212; --card: #1e1e1e; --text: #ffffff; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-card h4 { margin: 0; font-size: 11px; color: #bdc3c7; text-transform: uppercase; }
        .stat-card span { font-size: 18px; font-weight: bold; color: var(--primary); display: block; margin-top: 5px; }
        .profit-card { border-bottom-color: var(--green); }
        .profit-card span { color: var(--green); }

        .box { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border-top: 4px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #2c2c2c; color: white; box-sizing: border-box; outline: none; }
        
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; flex: 1; }
        
        .btn-save { background: var(--primary); color: white; }
        .btn-print { background: var(--blue); color: white; }
        .btn-filter { background: #555; color: white; font-size: 12px; }
        .btn-excel { background: var(--green); color: white; margin-top: 15px; width: 100%; }

        #displayArea { margin-top: 20px; padding: 15px; background: #252525; border-radius: 10px; border-left: 5px solid var(--primary); display: none; line-height: 1.6; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; padding: 10px; display: block; text-align: center; border-radius: 8px; margin-top: 12px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        table, th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { background: #333; }
    </style>
</head>
<body onload="updateDashboard()">

<div class="container">
    <div class="dashboard">
        <div class="stat-card"><h4>Total</h4><span id="statTotal">0</span></div>
        <div class="stat-card"><h4>Delivered</h4><span id="statDelivered">0</span></div>
        <div class="stat-card profit-card"><h4>Profit</h4><span id="statProfit">Rs. 0</span></div>
    </div>

    <div class="box">
        <h2>TG FASHION PRO</h2>
        <input type="text" id="addRef" placeholder="Ref No (TG001)">
        <input type="text" id="addName" placeholder="Customer Name">
        <input type="text" id="addPhone" placeholder="WhatsApp (9477... )">
        <input type="text" id="addAddr" placeholder="Address">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="cost" placeholder="Cost">
            <input type="number" id="price" placeholder="Price">
        </div>
        <select id="addStatus">
            <option value="Pending">Pending ⏳</option>
            <option value="Shipped">Shipped 🚚</option>
            <option value="Delivered">Delivered ✅</option>
        </select>
        <input type="text" id="addTrack" placeholder="Tracking No">
        <button class="btn-save" onclick="savePackage()">SAVE PACKAGE</button>
    </div>

    <div class="box">
        <input type="text" id="searchRef" placeholder="Search Ref Number...">
        <div class="btn-group">
            <button style="background:#3498db; color:white;" onclick="searchPackage()">SEARCH</button>
            <button class="btn-print" onclick="printLabel()">PRINT LABEL 🖨️</button>
        </div>
        
        <div class="btn-group" style="margin-top:15px;">
            <button class="btn-filter" onclick="filterData('All')">Show All</button>
            <button class="btn-filter" onclick="filterData('Pending')">Pending</button>
            <button class="btn-filter" onclick="filterData('Shipped')">Shipped</button>
        </div>

        <div id="displayArea"></div>
        <button class="btn-excel" onclick="downloadExcel()">DOWNLOAD EXCEL REPORT 📊</button>
    </div>
</div>

<script>
    function updateDashboard() {
        let total = 0, delivered = 0, totalProfit = 0;
        for (let i = 0; i < localStorage.length; i++) {
            let data = JSON.parse(localStorage.getItem(localStorage.key(i)));
            if (data && data.ref) {
                total++;
                if (data.status === "Delivered") delivered++;
                totalProfit += (parseFloat(data.profit) || 0);
            }
        }
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statDelivered').innerText = delivered;
        document.getElementById('statProfit').innerText = "Rs. " + totalProfit;
    }

    function savePackage() {
        const ref = document.getElementById('addRef').value.trim().toUpperCase();
        if(!ref) return alert("Ref No required!");
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        const data = {
            ref: ref, name: document.getElementById('addName').value,
            phone: document.getElementById('addPhone').value,
            address: document.getElementById('addAddr').value,
            status: document.getElementById('addStatus').value,
            track: document.getElementById('addTrack').value,
            profit: price - cost, date: new Date().toLocaleDateString()
        };
        localStorage.setItem(ref, JSON.stringify(data));
        location.reload();
    }

    function searchPackage() {
        const ref = document.getElementById('searchRef').value.trim().toUpperCase();
        const data = JSON.parse(localStorage.getItem(ref));
        const area = document.getElementById('displayArea');
        if(data) {
            area.style.display = "block";
            const msg = `Hello ${data.name}, TG FASHION package ${data.ref} is ${data.status}.`;
            const waLink = `whatsapp://send?phone=${data.phone}&text=${encodeURIComponent(msg)}`;
            area.innerHTML = `<strong>Customer:</strong> ${data.name}<br><strong>Status:</strong> ${data.status}<br><strong>Profit:</strong> Rs. ${data.profit}<a href="${waLink}" class="wa-btn">SEND WHATSAPP</a>`;
        } else { alert("Not found!"); }
    }

    function printLabel() {
        const ref = document.getElementById('searchRef').value.trim().toUpperCase();
        const data = JSON.parse(localStorage.getItem(ref));
        if(!data) return alert("කරුණාකර Ref එකක් සර්ච් කර ඉන්න!");
        const printWin = window.open('', '', 'width=400,height=400');
        printWin.document.write(`<html><body style="font-family:sans-serif; border:3px solid #000; padding:20px; text-align:center;"><h2>TG FASHION</h2><hr><div style="text-align:left;"><h3>TO: ${data.name}</h3><p>ADDR: ${data.address}</p><p>TEL: ${data.phone}</p><p>REF: ${data.ref}</p></div><script>window.onload=function(){window.print();window.close();}<\/script></body></html>`);
    }

    function filterData(status) {
        let area = document.getElementById('displayArea');
        let html = `<h4>${status} Orders</h4><table><tr><th>Ref</th><th>Name</th><th>Status</th></tr>`;
        for (let i = 0; i < localStorage.length; i++) {
            let data = JSON.parse(localStorage.getItem(localStorage.key(i)));
            if (status === 'All' || data.status === status) {
                html += `<tr><td>${data.ref}</td><td>${data.name}</td><td>${data.status}</td></tr>`;
            }
        }
        area.innerHTML = html + `</table>`;
        area.style.display = "block";
    }

    function downloadExcel() {
        let allData = [];
        for (let i = 0; i < localStorage.length; i++) {
            let d = JSON.parse(localStorage.getItem(localStorage.key(i)));
            if (d && d.ref) allData.push(d);
        }
        const ws = XLSX.utils.json_to_sheet(allData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "TG_Report.xlsx");
    }
</script>
</body>

</html>
